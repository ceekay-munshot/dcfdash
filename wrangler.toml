# Serve the dashboard as static assets on Cloudflare Workers.
# The site root is ./public, so / -> public/index.html and the frontend fetches
# /data/*.json and /js/dcf-engine.js. No build step, no server code.
name = "dcfdash"
compatibility_date = "2026-06-01"

[assets]
directory = "./public"
not_found_handling = "single-page-application"
