<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intrinsic — Indian Equity DCF Valuations</title>
  <meta name="description" content="Discounted cash flow valuations for NSE-listed companies." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
          },
          colors: {
            up: { DEFAULT: '#059669', soft: '#ecfdf5', ring: '#a7f3d0' },
            down: { DEFAULT: '#e11d48', soft: '#fff1f2', ring: '#fecdd3' },
          },
        },
      },
    };
  </script>
  <!-- ExcelJS loaded now for the later Excel-export phase (unused in Phase 1) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js" defer></script>

  <style>
    body { background:
      radial-gradient(1200px 600px at 12% -8%, #eef2ff 0%, rgba(238,242,255,0) 55%),
      radial-gradient(1000px 600px at 100% 0%, #ecfeff 0%, rgba(236,254,255,0) 50%),
      #f8fafc; }
    .tnum { font-variant-numeric: tabular-nums; }
    .card { background:#fff; border:1px solid #f1f5f9; box-shadow:0 1px 2px rgba(15,23,42,.04), 0 8px 24px -12px rgba(15,23,42,.10); }
    .glass { background:rgba(255,255,255,.72); backdrop-filter:saturate(180%) blur(12px); }
    .fade-in { animation: fade .35s ease both; }
    @keyframes fade { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }
    .skeleton { background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 37%,#f1f5f9 63%); background-size:400% 100%; animation: sh 1.3s ease infinite; }
    @keyframes sh { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
    .tab-active { background:#0f172a; color:#fff; }
    ::-webkit-scrollbar { width:10px; height:10px; } ::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:9999px; }
  </style>
</head>
<body class="font-sans text-slate-700 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="glass sticky top-0 z-40 border-b border-slate-200/60">
    <div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="h-9 w-9 rounded-xl bg-slate-900 text-white grid place-items-center font-display font-extrabold">i</div>
        <div>
          <div class="font-display font-extrabold text-slate-900 leading-none tracking-tight">Intrinsic</div>
          <div class="text-[11px] text-slate-400 leading-none mt-0.5">Indian Equity DCF</div>
        </div>
      </div>
      <!-- client branding slot -->
      <div id="brandingSlot" class="text-xs text-slate-400 font-medium">Powered by valueinvesting.io</div>
    </div>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto px-5 pb-20">

    <!-- Hero / search -->
    <section class="pt-12 pb-7 text-center">
      <h1 class="font-display font-extrabold tracking-tight text-slate-900 text-3xl sm:text-4xl">What's it really worth?</h1>
      <p class="mt-2.5 text-slate-500 max-w-xl mx-auto">Discounted cash flow fair value for <span id="universeCount" class="font-semibold text-slate-700">NSE-listed</span> companies — search any name or ticker.</p>

      <div class="relative max-w-xl mx-auto mt-7">
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-3.5-3.5"/></svg>
          <input id="search" type="text" autocomplete="off" spellcheck="false"
            placeholder="Search “Reliance” or “TCS.NS”…"
            class="w-full pl-12 pr-4 h-14 rounded-2xl card text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:ring-2 focus:ring-slate-900/10 focus:border-slate-300 transition" />
        </div>
        <div id="dropdown" class="hidden absolute z-30 mt-2 w-full card rounded-2xl overflow-hidden text-left"></div>
      </div>
    </section>

    <!-- Result region -->
    <section id="result"></section>

  </main>

  <footer class="border-t border-slate-200/60">
    <div class="max-w-6xl mx-auto px-5 py-5 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-slate-400">
      <div id="freshness">Loading data…</div>
      <div>DCF data sourced from valueinvesting.io · Displayed for information, not investment advice.</div>
    </div>
  </footer>

  <script type="module">
    // ---------- Indian number formatting ----------
    const indianGroup = (intStr) => {
      let neg = intStr.startsWith('-'); if (neg) intStr = intStr.slice(1);
      const last3 = intStr.slice(-3), rest = intStr.slice(0, -3);
      const g = rest ? rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + ',' + last3 : last3;
      return (neg ? '-' : '') + g;
    };
    const fmtRupee = (x, dec = 2) => {
      if (x == null || !isFinite(x)) return '—';
      const neg = x < 0, [i, f] = Math.abs(x).toFixed(dec).split('.');
      return (neg ? '−' : '') + '₹' + indianGroup(i) + (dec ? '.' + f : '');
    };
    // amount given in millions of INR -> ₹ Cr / ₹ L Cr
    const fmtCr = (mn) => {
      if (mn == null || !isFinite(mn)) return '—';
      const cr = mn / 10, neg = cr < 0, a = Math.abs(cr);
      if (a >= 1e5) return (neg ? '−' : '') + '₹' + (a / 1e5).toFixed(2) + ' L Cr';
      if (a >= 1) return (neg ? '−' : '') + '₹' + indianGroup(Math.round(a).toString()) + ' Cr';
      return (neg ? '−' : '') + '₹' + (a * 100).toFixed(1) + ' L';
    };
    const fmtShares = (mn) => {
      if (mn == null || !isFinite(mn)) return '—';
      const cr = mn / 10;
      if (cr < 1) return cr.toFixed(2) + ' Cr';
      const [i, f] = cr.toFixed(2).split('.');
      return indianGroup(i) + (f && f !== '00' ? '.' + f : '') + ' Cr';
    };
    const fmtPct = (r, d = 2) => r == null || !isFinite(r) ? '—' : (r * 100).toFixed(d) + '%';
    const signedPct = (r, d = 1) => r == null || !isFinite(r) ? '—' : (r >= 0 ? '+' : '−') + Math.abs(r * 100).toFixed(d) + '%';
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    const VARIANTS = [
      { key: 'dcf-growth-exit-5y', label: 'Growth-exit 5Y' },
      { key: 'dcf-growth-exit-10y', label: 'Growth-exit 10Y' },
      { key: 'dcf-ebitda-exit-5y', label: 'EBITDA-exit 5Y' },
      { key: 'dcf-ebitda-exit-10y', label: 'EBITDA-exit 10Y' },
    ];

    const state = { index: [], meta: null, doc: null, variant: 'dcf-growth-exit-5y', detailTab: 'revenue', showTables: false, drivers: null, driverDefaults: null, adjusted: false, calibEv: 1, active: -1, matches: [] };
    const $ = (id) => document.getElementById(id);

    // ---------- data load ----------
    async function init() {
      try {
        const [meta, index] = await Promise.all([
          fetch('data/dcf-metadata.json').then((r) => r.json()).catch(() => null),
          fetch('data/index.json').then((r) => r.json()),
        ]);
        state.meta = meta; state.index = index.companies || [];
        $('universeCount').textContent = (index.count || state.index.length).toLocaleString('en-IN') + ' NSE-listed';
        if (meta?.generated_at) {
          const d = new Date(meta.generated_at);
          $('freshness').textContent = 'Data as of ' + d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) +
            ` · ${(meta.covered ?? state.index.length).toLocaleString('en-IN')} companies covered`;
        }
        renderEmpty();
        if (location.hash.length > 1) selectTicker(decodeURIComponent(location.hash.slice(1)));
      } catch (e) {
        $('result').innerHTML = `<div class="card rounded-2xl p-8 text-center text-slate-500">Couldn't load data. Please refresh.</div>`;
        $('freshness').textContent = 'Data unavailable';
      }
    }

    // ---------- search ----------
    function searchIndex(q) {
      q = q.trim().toLowerCase(); if (!q) return [];
      const starts = [], contains = [];
      for (const c of state.index) {
        const t = c.ticker.toLowerCase(), n = (c.name || '').toLowerCase();
        if (t.startsWith(q) || n.startsWith(q)) starts.push(c);
        else if (t.includes(q) || n.includes(q)) contains.push(c);
        if (starts.length >= 8) break;
      }
      return [...starts, ...contains].slice(0, 8);
    }
    function renderDropdown() {
      const dd = $('dropdown');
      if (!state.matches.length) { dd.classList.add('hidden'); return; }
      dd.innerHTML = state.matches.map((c, i) => `
        <button data-i="${i}" class="w-full flex items-center justify-between gap-3 px-4 py-3 text-left hover:bg-slate-50 ${i === state.active ? 'bg-slate-50' : ''} ${i ? 'border-t border-slate-100' : ''}">
          <span class="min-w-0">
            <span class="block font-semibold text-slate-800 truncate">${esc(c.name || c.ticker)}</span>
            <span class="block text-xs text-slate-400 truncate">${esc(c.ticker)}${c.sector ? ' · ' + esc(c.sector) : ''}</span>
          </span>
          <span class="text-sm tnum ${c.upside_pct >= 0 ? 'text-up' : 'text-down'} font-semibold shrink-0">${signedPct(c.upside_pct)}</span>
        </button>`).join('');
      dd.classList.remove('hidden');
      dd.querySelectorAll('button').forEach((b) => b.onclick = () => selectTicker(state.matches[+b.dataset.i].ticker));
    }
    function onInput() {
      state.matches = searchIndex($('search').value); state.active = -1; renderDropdown();
    }
    function onKey(e) {
      if (e.key === 'ArrowDown') { e.preventDefault(); state.active = Math.min(state.active + 1, state.matches.length - 1); renderDropdown(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); state.active = Math.max(state.active - 1, 0); renderDropdown(); }
      else if (e.key === 'Enter') { const c = state.matches[state.active] || state.matches[0]; if (c) selectTicker(c.ticker); }
      else if (e.key === 'Escape') { $('dropdown').classList.add('hidden'); }
    }

    // ---------- company load + render ----------
    async function selectTicker(ticker) {
      $('dropdown').classList.add('hidden'); $('search').value = '';
      location.hash = encodeURIComponent(ticker);
      $('result').innerHTML = skeleton();
      try {
        const doc = await fetch('data/dcf/' + encodeURIComponent(ticker) + '.json').then((r) => { if (!r.ok) throw 0; return r.json(); });
        state.doc = doc;
        state.variant = doc.variants?.['dcf-growth-exit-5y']?.fair_value_per_share != null ? 'dcf-growth-exit-5y'
          : (VARIANTS.find((v) => doc.variants?.[v.key]?.fair_value_per_share != null)?.key || 'dcf-growth-exit-5y');
        state.detailTab = 'revenue';
        initDrivers(doc, state.variant);
        renderCompany(true);
      } catch {
        $('result').innerHTML = `<div class="card rounded-2xl p-8 text-center text-slate-500">No DCF data for <b>${esc(ticker)}</b>.</div>`;
      }
    }

    function verdict(up) {
      if (up == null) return { label: 'No estimate', cls: 'slate', soft: 'bg-slate-100 text-slate-600' };
      if (up > 0.02) return { label: 'Undervalued', cls: 'up', soft: 'bg-up-soft text-up' };
      if (up < -0.02) return { label: 'Overvalued', cls: 'down', soft: 'bg-down-soft text-down' };
      return { label: 'Fairly valued', cls: 'slate', soft: 'bg-slate-100 text-slate-600' };
    }

    // ---------- detailed model (VI's exact tables) ----------
    const RK = {
      'dcf-growth-exit-5y': 'R_end_5', 'dcf-growth-exit-10y': 'R_end_10',
      'dcf-ebitda-exit-5y': 'R_end_ebitda_5', 'dcf-ebitda-exit-10y': 'R_end_ebitda_10',
    };
    const rowsOf = (o, ks) => o ? ks.filter((k) => o[k] != null).map((k) => o[k]) : [];
    const BOLD = /^(Revenue|Net profit|EBITDA|Free Cash Flow|Present value of FCF|Enterprise value|Equity value|Fair price|Net working capital|Total depreciation)/i;
    const SOFT = /(%|rate|Days|Margin|Growth|multiple|Timing|Historical)/i;
    function mtable(rows, header, minw = 520) {
      if (!rows.length && !header) return '<div class="text-sm text-slate-400 py-3">Not available.</div>';
      const head = header ? `<thead><tr>${header.map((c, i) => `<th class="px-3 py-2 text-[11px] font-semibold text-slate-400 uppercase tracking-wide whitespace-nowrap ${i ? 'text-right' : 'text-left'}">${esc(c)}</th>`).join('')}</tr></thead>` : '';
      const body = rows.map((r) => {
        const b = BOLD.test(String(r[0] || '')), s = !b && SOFT.test(String(r[0] || ''));
        return `<tr class="border-t border-slate-100">
          <td class="px-3 py-1.5 text-left whitespace-nowrap ${b ? 'font-semibold text-slate-900' : s ? 'text-xs text-slate-400' : 'text-slate-600'}">${esc(r[0])}</td>
          ${r.slice(1).map((v) => `<td class="px-3 py-1.5 text-right tnum whitespace-nowrap ${b ? 'font-semibold text-slate-900' : s ? 'text-slate-400' : 'text-slate-700'}">${v === '' || v == null ? '' : esc(v)}</td>`).join('')}
        </tr>`;
      }).join('');
      return `<div class="overflow-x-auto -mx-1"><table class="w-full text-sm border-collapse" style="min-width:${minw}px">${head}<tbody>${body}</tbody></table></div>`;
    }
    const card = (title, body, note) => `<div class="card rounded-3xl p-5 sm:p-6">
      <div class="flex items-baseline justify-between gap-3 mb-3"><h3 class="font-display font-bold text-slate-900 text-lg">${title}</h3>${note ? `<span class="text-xs text-slate-400 shrink-0">${note}</span>` : ''}</div>${body}</div>`;
    // ---------- numeric helpers for the visuals ----------
    const num = (v) => { if (v == null) return null; if (typeof v === 'number') return isFinite(v) ? v : null; let s = String(v).trim(); const neg = /^\(/.test(s) || /^-/.test(s); s = s.replace(/[(),%x₹$€£\s]/g, '').replace(/^-/, ''); const n = parseFloat(s); return isFinite(n) ? (neg ? -n : n) : null; };
    const compactCr = (mn) => { if (mn == null) return '—'; const cr = mn / 10, a = Math.abs(cr), s = cr < 0 ? '−' : ''; if (a >= 1e5) return s + '₹' + (a / 1e5).toFixed(2) + ' L Cr'; if (a >= 1) return s + '₹' + Math.round(a).toLocaleString('en-IN') + ' Cr'; return s + '₹' + (a * 100).toFixed(1) + ' L'; };
    const tinyCr = (mn) => { if (mn == null) return ''; const cr = Math.abs(mn / 10), s = mn < 0 ? '−' : ''; if (cr >= 1e5) return s + (cr / 1e5).toFixed(1) + 'L'; if (cr >= 1e3) return s + (cr / 1e3).toFixed(1) + 'k'; return s + Math.round(cr); };
    const TYP = { 'dcf-growth-exit-5y': 'typical_5', 'dcf-growth-exit-10y': 'typical_10', 'dcf-ebitda-exit-5y': 'typical_ebitda_5', 'dcf-ebitda-exit-10y': 'typical_ebitda_10' };
    const mid = (r) => r && r.low != null && r.high != null ? (r.low + r.high) / 2 : null;
    const rangeRupee = (r) => r ? `${fmtRupee(r.low)} – ${fmtRupee(r.high)}` : '—';
    const rangePct = (r) => r ? `${(r.low * 100).toFixed(1)}% – ${(r.high * 100).toFixed(1)}%` : '—';

    // recompute fair value at a given WACC and growth/multiple (for the live sensitivity grid)
    function termInputs(d, vk) { const T = (d.model_tables || {}).terminal || {}, typ = T[TYP[vk]]; return { ebitda: num(typ && typ[4]), fcf: num(typ && typ[8]), exitYear: num(typ && typ[9]) || (vk.includes('10y') ? 10 : 5) }; }
    function fairAt(d, vk, wacc, second) {
      const isEb = vk.includes('ebitda'), N = vk.includes('10y') ? 10 : 5;
      let spv = 0; for (const p of (d.shared_projection || []).slice(0, N)) if (p.fcf != null && p.timing != null) spv += p.fcf / Math.pow(1 + wacc, p.timing);
      const ti = termInputs(d, vk); let tv;
      if (isEb) tv = ti.ebitda != null ? ti.ebitda * second : null;
      else tv = (ti.fcf != null && wacc - second > 0) ? ti.fcf * (1 + second) / (wacc - second) : null;
      if (tv == null) return null;
      const ev = spv + tv / Math.pow(1 + wacc, ti.exitYear), eq = ev - (d.net_debt || 0);
      return d.shares_outstanding ? eq / d.shares_outstanding : null;
    }

    // ---------- forward DCF engine (driver-based what-if) ----------
    const pPct = (x) => x == null ? '—' : (x * 100).toFixed(1) + '%';
    function deriveDefaults(d, vk) {
      const N = vk.includes('10y') ? 10 : 5, p = (d.shared_projection || []).slice(0, N), ed = d.assumptions_raw || {}, avg = (a) => a.length ? a.reduce((x, y) => x + y, 0) / a.length : 0;
      const margins = p.map((x) => x.revenue ? x.ebitda / x.revenue : null).filter((x) => x != null);
      const das = p.map((x) => x.revenue ? Math.abs(x.da || 0) / x.revenue : null).filter((x) => x != null);
      const nwcL = (ed.current_nwc != null && d.revenue_ttm) ? ed.current_nwc / d.revenue_ttm : 0.05;
      return {
        N, method: vk.includes('ebitda') ? 'e' : 'g',
        g: (p[0] && d.revenue_ttm) ? (p[0].revenue / d.revenue_ttm - 1) : 0.08,
        margin: avg(margins) || 0.2, da: avg(das) || 0.04,
        capex: Math.abs(ed.avg_capex_ratio != null ? ed.avg_capex_ratio : 0.05),
        tax: ed.tax_rate_dcf != null ? ed.tax_rate_dcf : 0.25,
        nwc: Math.max(Math.min(nwcL, 0.4), -0.1),
        wacc: (d.wacc && d.wacc.selected) || 0.13,
        tg: ed.avg_long_growth != null ? ed.avg_long_growth : 0.02,
        mult: (d.variants && d.variants[vk] && d.variants[vk].terminal && d.variants[vk].terminal.exit_multiple) || 4,
        rev0: d.revenue_ttm, netDebt: d.net_debt, shares: d.shares_outstanding,
      };
    }
    function runModel(d, vk, dr) {
      const N = dr.N, y0 = (d.shared_projection && d.shared_projection[0] && d.shared_projection[0].year) || (new Date().getFullYear() + 1);
      let rev = dr.rev0 || 0; const projection = [];
      for (let t = 1; t <= N; t++) { const prev = rev; rev = rev * (1 + dr.g); const ebitda = rev * dr.margin, da = rev * dr.da, ebit = ebitda - da, capex = rev * dr.capex, dnwc = (rev - prev) * dr.nwc; const fcf = ebit * (1 - dr.tax) + da - capex - dnwc, pv = fcf / Math.pow(1 + dr.wacc, t - 0.5); projection.push({ year: y0 + t - 1, revenue: rev, ebitda, fcf, pv_fcf: pv }); }
      const last = projection[N - 1] || { fcf: 0, ebitda: 0 };
      const tv = dr.method === 'e' ? last.ebitda * dr.mult : (dr.wacc - dr.tg > 0 ? last.fcf * (1 + dr.tg) / (dr.wacc - dr.tg) : 0);
      const k = state.calibEv || 1;
      const pvtv = (tv / Math.pow(1 + dr.wacc, N)) * k, sumpv = projection.reduce((a, p) => a + p.pv_fcf, 0) * k, ev = sumpv + pvtv, equity = ev - (dr.netDebt || 0);
      return { fair: dr.shares ? equity / dr.shares : null, ev, equity, sumpv, pvtv, tv, projection };
    }
    // calibrate the model's EV to VI's at the base case, so base == VI and adjustments are smooth
    function initDrivers(doc, vk) {
      state.driverDefaults = deriveDefaults(doc, vk);
      state.drivers = { ...state.driverDefaults };
      state.adjusted = false; state.calibEv = 1;
      const m = runModel(doc, vk, state.driverDefaults);
      const viEv = doc.variants && doc.variants[vk] && doc.variants[vk].enterprise_value;
      state.calibEv = (viEv != null && m.ev && isFinite(viEv / m.ev)) ? viEv / m.ev : 1;
    }
    function getView(d, vk) {
      if (state.adjusted && state.drivers) { const m = runModel(d, vk, state.drivers); return { model: true, fair: m.fair, up: d.price_current ? m.fair / d.price_current - 1 : null, pvF: m.sumpv, pvT: m.pvtv, ev: m.ev, nd: d.net_debt, eq: m.equity, proj: m.projection }; }
      const v = d.variants[vk] || {}; return { model: false, fair: v.fair_value_per_share, up: v.upside_pct, pvF: v.pv_projection, pvT: v.pv_terminal, ev: v.enterprise_value, nd: v.net_debt != null ? v.net_debt : d.net_debt, eq: v.equity_value, proj: (d.shared_projection || []).slice(0, vk.includes('10y') ? 10 : 5) };
    }
    function fairCell(d, vk, wacc, second) {
      if (state.adjusted && state.drivers) { const dr = { ...state.drivers, wacc }; if (vk.includes('ebitda')) dr.mult = second; else dr.tg = second; return runModel(d, vk, dr).fair; }
      return fairAt(d, vk, wacc, second);
    }
    function renderAssumptions(d) {
      const vk = state.variant, def = state.driverDefaults || {}, dr = state.drivers || {}, isEb = vk.includes('ebitda');
      const sl = (key, label, fmt, min, max, step) => `<div class="px-0.5">
        <div class="flex justify-between items-baseline mb-1"><label class="text-xs font-semibold text-slate-600">${label}</label><span id="lbl-${key}" class="text-sm font-bold tnum text-indigo-700">${fmt(dr[key])}</span></div>
        <input data-driver="${key}" type="range" min="${min}" max="${max}" step="${step}" value="${dr[key]}" class="w-full accent-indigo-600 cursor-pointer">
        <div class="text-[10px] text-slate-400 mt-0.5">VI base ${fmt(def[key])}</div></div>`;

        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-3.5">${sliders}</div>

        </div>`, 'founder what-if');
    }

    // ---------- SVG chart engine ----------
    function niceTicks(max, count = 4) {
      if (!(max > 0)) return [0, 1];
      const s0 = max / count, mag = Math.pow(10, Math.floor(Math.log10(s0))), n = s0 / mag;

    function gridY(ticks, yMax, base, ih, pL, W, pR, af) {
      return ticks.map((t) => { const y = base - (t / yMax) * ih; return `<line x1="${pL}" y1="${y.toFixed(1)}" x2="${W - pR}" y2="${y.toFixed(1)}" stroke="#eef2f7"/><text x="${pL - 6}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-size="11" fill="#94a3b8">${af(t)}</text>`; }).join('');
    }

    function svgFcf(proj) {
      if (!proj.length) return '<div class="text-sm text-slate-400 py-10 text-center">No projection.</div>';
      const W = 640, H = 232, pL = 42, pR = 12, pT = 16, pB = 26, iw = W - pL - pR, ih = H - pT - pB, base = pT + ih;
      const max = Math.max(...proj.map((p) => Math.abs(p.fcf || 0)), 1), ticks = niceTicks(max, 4), yMax = ticks[ticks.length - 1] || max, af = axisFmt(yMax);
      const n = proj.length, slot = iw / n, bw = Math.min(slot * 0.56, 44);
      const bars = proj.map((p, i) => {
        const cx = pL + slot * i + slot / 2, x = cx - bw / 2, fcf = Math.abs(p.fcf || 0), pv = Math.abs(p.pv_fcf || 0), fH = (fcf / yMax) * ih, pH = (pv / yMax) * ih;
        return `<rect x="${x.toFixed(1)}" y="${(base - fH).toFixed(1)}" width="${bw.toFixed(1)}" height="${fH.toFixed(1)}" rx="4" fill="#e0e7ff"/><rect x="${x.toFixed(1)}" y="${(base - pH).toFixed(1)}" width="${bw.toFixed(1)}" height="${pH.toFixed(1)}" rx="4" fill="url(#fg)"/><text x="${cx.toFixed(1)}" y="${(base - fH - 6).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="600" fill="#475569">${af(fcf)}</text><text x="${cx.toFixed(1)}" y="${(base + 16).toFixed(1)}" text-anchor="middle" font-size="11" fill="#94a3b8">'${String(p.year).slice(2)}</text>`;
      }).join('');
      return SVG(W, H, gridY(ticks, yMax, base, ih, pL, W, pR, af) + bars, '<defs><linearGradient id="fg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#4338ca"/></linearGradient></defs>');
    }

    function svgWaterfall(pvF, pvT, ev, nd, eq) {
      if (ev == null) return '<div class="text-sm text-slate-400 py-10 text-center">Not available for this method.</div>';
      const steps = [{ l: 'PV·FCF', v: pvF || 0, t: 'p' }, { l: 'PV·term', v: pvT || 0, t: 'p' }, { l: 'EV', v: ev, t: 'x' }, { l: '−Net debt', v: -(nd || 0), t: 'n' }, { l: 'Equity', v: eq, t: 'x' }];
      const W = 640, H = 232, pL = 42, pR = 12, pT = 18, pB = 28, iw = W - pL - pR, ih = H - pT - pB, base = pT + ih;
      const max = Math.max(ev || 0, eq || 0, (pvF || 0) + (pvT || 0), 1), ticks = niceTicks(max, 4), yMax = ticks[ticks.length - 1] || max, af = axisFmt(yMax);

        out.push(`<rect x="${x.toFixed(1)}" y="${yTop.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="${color}"/><text x="${cx.toFixed(1)}" y="${(yTop - 6).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="700" fill="#334155">${s.t === 'n' ? '−' : ''}${af(Math.abs(s.v))}</text><text x="${cx.toFixed(1)}" y="${(base + 15).toFixed(1)}" text-anchor="middle" font-size="10" fill="#64748b">${s.l}</text>`);

    // ---------- the visual model ----------

      const stat = (label, value, sub = '') => `
        <div class="card rounded-2xl p-4">
          <div class="text-[11px] uppercase tracking-wide text-slate-400 font-semibold">${label}</div>
          <div class="mt-1 text-lg font-display font-bold text-slate-900 tnum">${value}</div>
          ${sub ? `<div class="text-xs text-slate-400 mt-0.5">${sub}</div>` : ''}
        </div>`;

      $('result').innerHTML = `
      <div class="${animate ? 'fade-in ' : ''}space-y-5">
        <!-- Hero -->
        <div class="card rounded-3xl p-6 sm:p-8">
          <div class="flex flex-col lg:flex-row lg:items-center gap-7">
            <!-- identity + price -->
            <div class="lg:w-[42%]">
              <div class="flex items-center gap-2 text-xs">
                <span class="px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 font-semibold tnum">${esc(d.ticker)}</span>
                ${d.sector ? `<span class="text-slate-400">${esc(d.sector)}</span>` : ''}
              </div>
              <h2 class="mt-2 font-display font-extrabold text-slate-900 text-2xl sm:text-3xl tracking-tight leading-tight">${esc(d.name || d.ticker)}</h2>
              <div class="mt-4 flex items-end gap-6">
                <div>
                  <div class="text-[11px] uppercase tracking-wide text-slate-400 font-semibold">Current price</div>
                  <div class="text-2xl font-bold text-slate-900 tnum mt-0.5">${fmtRupee(d.price_current)}</div>
                </div>
                <div>
                  <div class="text-[11px] uppercase tracking-wide text-slate-400 font-semibold">DCF fair value</div>
                  <div class="text-2xl font-bold tnum mt-0.5 ${isUp ? 'text-up' : 'text-down'}">${fmtRupee(v.fair_value_per_share)}</div>
                </div>
              </div>
            </div>

            <!-- upside gauge -->
            <div class="lg:flex-1 lg:border-l lg:border-slate-100 lg:pl-7">
              <div class="flex items-center justify-between">
                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-sm font-semibold ${V.soft}">
                  <span class="h-1.5 w-1.5 rounded-full ${V.cls === 'up' ? 'bg-up' : V.cls === 'down' ? 'bg-down' : 'bg-slate-400'}"></span>${V.label}
                </span>
                <span class="text-3xl font-display font-extrabold tnum ${isUp ? 'text-up' : 'text-down'}">${signedPct(up)}</span>
              </div>
              <div class="relative mt-4 h-3 rounded-full bg-slate-100">
                <div class="absolute top-0 bottom-0 left-1/2 w-px bg-slate-300"></div>
                <div class="absolute top-0 bottom-0 rounded-full ${isUp ? 'bg-up' : 'bg-down'}"
                  style="${isUp ? 'left:50%' : 'right:50%'};width:${fillPct}%"></div>
              </div>
              <div class="flex justify-between text-[11px] text-slate-400 mt-1.5 tnum"><span>−100%</span><span>fair</span><span>+100%</span></div>
              <div class="mt-4 flex flex-wrap gap-2">${tabs}</div>
            </div>
          </div>
        </div>

        <!-- key stats -->
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-3">
          ${stat('Market cap', fmtCr(d.market_cap))}
          ${stat('WACC', fmtPct(d.wacc?.selected))}
          ${stat('Terminal', term.method === 'exit_multiple' ? 'EBITDA exit' : 'Perpetuity', termLabel.split('·')[1]?.trim() || '')}
          ${stat('Shares out.', fmtShares(d.shares_outstanding), 'shares')}
          ${stat('Net debt', fmtCr(d.net_debt))}
        </div>

        <p class="text-xs text-slate-400 px-1">Base case = valueinvesting.io's published figures. Adjust the assumptions below to run your own scenario. ${d.is_financial ? 'Financial company — DCF may be supplemented by a dividend model.' : ''}</p>

        ${renderAssumptions(d)}
        <div id="modelView">${renderDetail(d)}</div>
      </div>`;

      const wireModelView = () => {
        $('result').querySelectorAll('#modelView [data-tab]').forEach((b) => b.onclick = () => { if (!b.disabled) { state.detailTab = b.dataset.tab; refreshModel(); } });
        $('result').querySelectorAll('#modelView [data-drawer]').forEach((b) => b.onclick = () => { state.showTables = !state.showTables; refreshModel(); });
      };
      const refreshModel = () => { const mv = document.getElementById('modelView'); if (mv) { mv.innerHTML = renderDetail(d); wireModelView(); } };
      $('result').querySelectorAll('[data-v]').forEach((b) => b.onclick = () => { if (!b.disabled) { state.variant = b.dataset.v; initDrivers(d, b.dataset.v); renderCompany(false); } });
      $('result').querySelectorAll('[data-driver]').forEach((inp) => inp.oninput = () => {
        const k = inp.dataset.driver; state.drivers[k] = parseFloat(inp.value); state.adjusted = true;
        const lbl = document.getElementById('lbl-' + k); if (lbl) lbl.textContent = k === 'mult' ? parseFloat(inp.value).toFixed(1) + '×' : (parseFloat(inp.value) * 100).toFixed(1) + '%';
        const bd = document.getElementById('adjBadge'); if (bd) { bd.innerHTML = '<span class="h-1.5 w-1.5 rounded-full bg-amber-500"></span>Your scenario'; bd.className = 'inline-flex items-center gap-1.5 text-[11px] font-semibold text-amber-600'; }
        refreshModel();
      });
      $('result').querySelectorAll('[data-reset]').forEach((b) => b.onclick = () => { state.drivers = { ...state.driverDefaults }; state.adjusted = false; renderCompany(false); });
      wireModelView();
    }

    // ---------- states ----------
    function skeleton() {
      return `<div class="space-y-5">
        <div class="card rounded-3xl p-8"><div class="h-6 w-48 skeleton rounded-lg"></div><div class="mt-4 h-10 w-72 skeleton rounded-lg"></div><div class="mt-6 h-3 w-full skeleton rounded-full"></div></div>
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-3">${Array(5).fill('<div class="card rounded-2xl p-4 h-20 skeleton"></div>').join('')}</div>
      </div>`;
    }
    function renderEmpty() {
      const picks = ['RELIANCE.NS', 'TCS.NS', 'HDFCBANK.NS', 'INFY.NS', 'ITC.NS', 'TATAMOTORS.NS']
        .filter((t) => state.index.some((c) => c.ticker === t));
      $('result').innerHTML = `
      <div class="card rounded-3xl p-10 text-center fade-in">
        <div class="h-12 w-12 mx-auto rounded-2xl bg-slate-900/5 grid place-items-center">
          <svg class="h-6 w-6 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg>
        </div>
        <h3 class="mt-4 font-display font-bold text-slate-800 text-lg">Search a company to see its valuation</h3>
        <p class="text-slate-400 text-sm mt-1">Fair value, upside, and the full DCF method — for any covered NSE name.</p>
        <div class="mt-5 flex flex-wrap gap-2 justify-center">
          ${picks.map((t) => `<button data-pick="${t}" class="px-3.5 py-1.5 rounded-full text-sm font-medium bg-white border border-slate-200 text-slate-600 hover:border-slate-300 hover:text-slate-900 transition tnum">${esc(t.replace('.NS', ''))}</button>`).join('')}
        </div>
      </div>`;
      $('result').querySelectorAll('[data-pick]').forEach((b) => b.onclick = () => selectTicker(b.dataset.pick));
    }

    // ---------- wire up ----------
    $('search').addEventListener('input', onInput);
    $('search').addEventListener('keydown', onKey);
    $('search').addEventListener('focus', onInput);
    document.addEventListener('click', (e) => { if (!e.target.closest('#dropdown') && e.target !== $('search')) $('dropdown').classList.add('hidden'); });
    window.addEventListener('hashchange', () => { if (location.hash.length > 1 && (!state.doc || encodeURIComponent(state.doc.ticker) !== location.hash.slice(1))) selectTicker(decodeURIComponent(location.hash.slice(1))); });
    init();
  </script>
</body>
</html>
