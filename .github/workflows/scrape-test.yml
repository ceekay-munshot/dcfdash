name: scrape-test

# Validates the single-company scraper + universe enumeration against the live
# site from a GitHub runner (open internet). Builds the universe, scrapes 4 test
# tickers (normal/normal/bank/loss-maker), writes sample JSON + STRATEGY-REPORT.md,
# commits them back, uploads artifacts, and echoes the report into the log.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/optimistic-sagan-hmur0e
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape-test.yml'

permissions:
  contents: write

concurrency:
  group: scrape-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (branch ref so we can commit back)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install cheerio
        run: npm install cheerio@1

      - name: Run strategy (universe + 4-ticker scrape + report)
        run: node scraper/strategy.mjs
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Echo STRATEGY-REPORT.md into the workflow log
        if: always()
        run: |
          echo '================ STRATEGY-REPORT.md ================'
          if [ -f STRATEGY-REPORT.md ]; then cat STRATEGY-REPORT.md; else echo "(no report produced)"; fi
          echo '================ end of report ================'

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-output
          path: |
            STRATEGY-REPORT.md
            public/data/
          if-no-files-found: warn

      - name: Commit scraper output back to the branch
        if: always()
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/data STRATEGY-REPORT.md
          if git diff --cached --quiet; then
            echo "No scraper output changes to commit."
            exit 0
          fi
          git commit -m "scrape: universe + sample DCF docs + strategy report [skip ci]"
          BR="${{ github.ref_name }}"
          pushed=0
          n=0
          until [ "$n" -ge 5 ]; do
            if git push origin "HEAD:$BR"; then echo "pushed to $BR"; pushed=1; break; fi
            n=$((n+1))
            echo "push failed (attempt $n); fetch + rebase + retry..."
            git fetch origin "$BR" || true
            git rebase "origin/$BR" || git rebase --abort || true
            sleep "$((2**n))"
          done
          if [ "$pushed" -ne 1 ]; then
            echo "::error::commit-back failed after retries — recon/output was not pushed"
            exit 1
          fi
