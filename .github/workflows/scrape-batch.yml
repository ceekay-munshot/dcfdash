name: scrape-batch

# Build the Indian universe (NSE -> probe) and run the resumable batch scraper.
# Push runs a validation slice (first 100). workflow_dispatch allows chunked /
# resumable runs via start_at / max_companies (Prompt 4 = full run).
on:
  workflow_dispatch:
    inputs:
      start_at:
        description: 'Universe index to start at (resume cursor)'
        default: '0'
      max_companies:
        description: 'Max companies to scrape this run'
        default: '100'
      build_universe:
        description: 'Rebuild universe.json from NSE (true/false)'
        default: 'true'
  push:
    branches:
      - claude/optimistic-sagan-hmur0e
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape-batch.yml'

permissions:
  contents: write

concurrency:
  group: scrape-batch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      START_AT: ${{ github.event.inputs.start_at || '0' }}
      MAX_COMPANIES: ${{ github.event.inputs.max_companies || '100' }}
      CONCURRENCY: '4'
      DELAY_MS: '200'
      UNIVERSE_CONCURRENCY: '4'
      UNIVERSE_DELAY_MS: '200'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install cheerio
        run: npm install cheerio@1

      - name: Build Indian universe (NSE -> probe each)
        if: ${{ github.event.inputs.build_universe != 'false' }}
        run: node scraper/build-universe.mjs

      - name: Scrape slice
        run: node scraper/scrape-all.mjs

      - name: Echo run summary
        if: always()
        run: |
          echo '=== universe.json (head) ==='
          head -c 700 public/data/universe.json 2>/dev/null || echo "(none)"
          echo; echo '=== dcf-metadata.json ==='
          cat public/data/dcf-metadata.json 2>/dev/null || echo "(none)"
          echo; echo "dcf docs written: $(ls public/data/dcf 2>/dev/null | wc -l)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-batch-output
          path: |
            public/data/universe.json
            public/data/dcf-metadata.json
            public/data/dcf/
          if-no-files-found: warn

      - name: Commit outputs (only if the run succeeded)
        if: success()
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/data/universe.json public/data/dcf-metadata.json public/data/dcf
          if git diff --cached --quiet; then echo "no changes to commit"; exit 0; fi
          git commit -m "scrape-batch: universe + DCF docs [start=${START_AT} max=${MAX_COMPANIES}] [skip ci]"
          BR="${{ github.ref_name }}"; pushed=0; n=0
          until [ "$n" -ge 5 ]; do
            if git push origin "HEAD:$BR"; then echo "pushed"; pushed=1; break; fi
            n=$((n+1)); echo "push retry $n"; git fetch origin "$BR" || true; git rebase "origin/$BR" || git rebase --abort || true; sleep "$((2**n))"
          done
          if [ "$pushed" -ne 1 ]; then echo "::error::commit-back failed after retries"; exit 1; fi
